<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Marcas y Tallas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #00205B;
            margin-bottom: 10px;
        }

        h3 {
            color: #00205B;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #00205B;
            color: white;
        }

        input, select {
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .btn {
            display: inline-block;
            background-color: #00205B;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #001640;
        }

        .inline-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .back-button{
            margin-bottom: 15px;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 768px) {
            .container {
                width: calc(100% - 24px);
                margin: 20px auto;
                padding: 16px;
            }

            .inline-form {
                flex-direction: column;
                align-items: stretch;
            }

            input,
            select,
            .btn {
                width: 100%;
                box-sizing: border-box;
                font-size: 16px;
            }

            th,
            td {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="back-button">
        <a href="{{ url_for('storage', nombre='Vaello')}}" class="btn">← Volver</a>
    </div>

    <h2>Gestión de Marcas y Tallas</h2>

    <!-- 🟦 AÑADIR MARCA -->
    <h3>Añadir Marca</h3>

    <form method="POST" action="{{ url_for('add_marca') }}" class="inline-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="nombre_marca" placeholder="Nombre de la marca" required>
        <button class="btn" type="submit">➕ Añadir Marca</button>
    </form>

    <!-- 🟦 TABLA MARCAS -->
    <div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>Marca</th>
                <th>Acciones</th>
            </tr>
        </thead>
            <tbody>
                {% for marca in marcas %}
                <tr>
                    <td>{{ marca.nombre }}</td>
                    <td>
                        <button class="btn" style="background-color:#c0392b"
                                onclick="eliminarMarca({{ marca.idmarca }})">
                            🗑️
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
    </table>
    </div>

    <!-- 🟦 AÑADIR TALLA -->
    <h3>Añadir Talla</h3>

    <div class="inline-form" id="tallaForm" data-csrf="{{ csrf_token() }}">
        <select id="marcaSelect">
            <option value="">-- Selecciona Marca --</option>
            {% for marca in marcas %}
                <option value="{{ marca.idmarca }}">{{ marca.nombre }}</option>
            {% endfor %}
        </select>
        <input type="text" id="tallaInput" placeholder="Nombre de la talla">
        <button type="button" class="btn" onclick="addTalla()">➕ Añadir Talla</button>
    </div>

    <!-- 🟦 TABLA TALLAS -->
    <div class="table-wrapper">
    <table id="tablaTallas">
        <thead>
            <tr>
                <th>Marca</th>
                <th>Talla</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for marca in marcas %}
                {% for talla in marca.tallas %}
                <tr>
                    <td>{{ marca.nombre }}</td>
                    <td>{{ talla.talla }}</td>
                    <td>
                        <button class="btn" style="background-color:#c0392b"
                                onclick="eliminarTalla({{ talla.id }})">
                            🗑️
                        </button>
                    </td>
                </tr>
                {% endfor %}
            {% endfor %}
        </tbody>
    </table>
    </div>

</div>

<script>
function addTalla() {
    const talla = document.getElementById("tallaInput").value.trim();
    const idmarca = document.getElementById("marcaSelect").value;
    const csrfToken = document.getElementById("tallaForm").dataset.csrf;

    if (!talla || !idmarca) {
        alert("Selecciona marca y escribe la talla");
        return;
    }

    fetch("{{ url_for('add_talla') }}", {
        method: "POST",
        headers: { 
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({ talla, idmarca })
    }).then(res => {
        if (res.ok) {
            // Limpiar input y actualizar tabla
            document.getElementById("tallaInput").value = "";
            location.reload(); // o podrías actualizar la tabla dinámicamente sin recargar
        } else {
            res.json().then(data => alert("Error: " + (data.error || "No se pudo añadir la talla")));
        }
    }).catch(err => alert("Error de red: " + err));
}
</script>

<script>

function eliminarMarca(idmarca) {
        if (!confirm("¿Seguro que quieres eliminar esta marca y sus tallas?")) return;

        fetch(`/delete_marca/${idmarca}`, {
            method: "POST",
            headers: {
                "X-CSRFToken": document.querySelector('input[name="csrf_token"]').value
            }
        }).then(res => {
            if (res.ok) {
                location.reload();
            } else {
                alert("Error al eliminar la marca");
            }
        });
    }

function eliminarTalla(idtalla) {
        if (!confirm("¿Seguro que quieres eliminar esta talla?")) return;

        fetch(`/delete_talla/${idtalla}`, {
            method: "POST",
            headers: {
                "X-CSRFToken": document.querySelector('input[name="csrf_token"]').value
            }
        }).then(res => {
            if (res.ok) {
                location.reload();
            } else {
                alert("Error al eliminar la talla");
            }
        });
    }

</script>

</body>
</html>
