<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            padding-top: 90px; /* espacio para el header fijo */
        }

        h1 {
            text-align: center;
            color: #00205B;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            height: 350px;
            position: relative;
        }

        .chart-box canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .header {
            position: fixed;        /* hace que el header quede fijo */
            top: 0;                 /* siempre en la parte superior */
            left: 0;
            width: 100%;            /* ocupa todo el ancho de la pantalla */
            display: flex;
            justify-content: center; /* centra el h1 horizontalmente */
            align-items: center;     /* centra verticalmente logo y h1 */
            padding: 10px 0;
            background-color: white; /* para que no se vea el contenido de abajo a través */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* sombra opcional */
            z-index: 9999;          /* se asegura que quede encima de todo */
        }

        .header .logo {
            height: 40px;           /* tamaño del logo */
            width: auto;
            position: absolute;     /* logo a la izquierda */
            left: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: bold;
            color: #0B1B4A;
            margin: 0;
            text-align: center;
        }
        .back-button{
            margin-bottom: 20px;
        }

        .btn{
            padding: 8px 14px;
            background-color: #00205B;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            body {
                padding: 96px 12px 20px;
            }

            .header {
                justify-content: flex-start;
                padding: 12px;
                min-height: 68px;
            }

            .header .logo {
                position: static;
                height: 28px;
                margin-right: 10px;
            }

            .header h1 {
                font-size: 20px;
                text-align: left;
            }

            .charts {
                grid-template-columns: 1fr;
                gap: 16px;
                margin-top: 20px;
            }

            .chart-box {
                height: 300px;
                padding: 14px;
            }

            .btn {
                display: inline-flex;
                width: 100%;
                justify-content: center;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo">
    <h1>Panel de Gráficos</h1>
</div>

<div class="back-button">
    <a href="{{ url_for('storage', nombre='Vaello')}}" class="btn">← Volver</a>
</div>

<div class="charts">
    
    <div class="chart-box">
        <canvas id="graficoProveedor"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="graficoEstado"></canvas>
    </div>
    
</div>

<script>
    // -----------------------
    // 📊 Gráfico 1
    // -----------------------
    new Chart(document.getElementById('graficoProveedor'), {
        type: 'bar',
        data: {
            labels: {{ proveedores | default([]) | tojson }},
            datasets: [{
                label: 'Pedidos sin actualización (30 días)',
                data: {{ pedidos_atrasados | default([]) | tojson }},
                backgroundColor: 'rgb(0, 32, 91)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    new Chart(document.getElementById('graficoEstado'), {
        type: 'bar',
        data: {
            labels: {{ proveedores_estado | default([]) | tojson }},
            datasets: {{ datasets_estado | default([]) | tojson }}
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    stacked: true
                },
                y: {
                    stacked: true,
                    beginAtZero: true
                }
            },
            plugins: {
                datalabels: {
                    color: 'white',
                    font: {
                        weight: 'bold',
                        size: 12
                    },
                    formatter: (value) => {
                        return value > 0 ? value : '';
                    }
                },
                legend: {
                    position: 'top'
                }
            }
        },
        plugins: [ChartDataLabels]
    });


</script>

</body>
</html>
