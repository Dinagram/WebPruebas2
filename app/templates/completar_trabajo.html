<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Trabajo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 500px;
            width: 90%;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }


        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"] {
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 1em;
        }

        .header-top {
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .progress {
            white-space: nowrap; /* evita salto de línea */
        }

        .header-right {
            display: flex;
            align-items: center;
        }

        .header-img {
            height: 28px;
            width: auto;
        }


        /* Ejemplo de objeto visual */
        .badge {
            background-color: #00205B;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .progress {
            font-weight: bold;
            color: #00205B;
            font-size: 1.1em;
            white-space: nowrap;
        }

        h1 {
            text-align: center;
            color: #00205B;
            margin-top: 40px; /* 🔹 separa visualmente del número de tarea */
            margin-bottom: 30px;
            font-size: 2em;
        }


        .form-group {
            margin-bottom: 20px;
        }

        .inline-inputs {
            display: flex;
            gap: 10px;
        }

        .inline-inputs input {
            flex: 1;
        }

        button {
            background-color: #00205B;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #00205B;
        }

        @media (max-width: 480px) {
            .inline-inputs {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Completar Trabajo</h1>
    </div>

    <form method="POST" action="{{ url_for('completar_trabajo', nombre=nombre) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="token" value="{{ token }}">

        {% for proceso, pedidos in procesos.items() %}

        <h2>Proceso: {{ proceso }}</h2>

        <table>
            <thead>
                <tr>
                    <th>ID Pedido</th>
                    <th>Artículo</th>
                    <th>Hechos</th>
                    <th>Total</th>
                    <th>Estado</th>
                </tr>
            </thead>

            <tbody>

            {% for pedido in pedidos %}
                <tr>
                    <td>{{ pedido.idpedido }}</td>

                    <td>{{ pedido.articulo }}</td>

                    <td>
                        <input type="number"
                               name="hechos_{{ pedido.id }}"
                               value="{{ pedido.numerohechos }}"
                               min="0">
                    </td>

                    <td>{{ pedido.numerototal }}</td>

                    <td>{{ pedido.estadopedido }}</td>
                </tr>
            {% endfor %}

            </tbody>
        </table>

        <br>

        {% endfor %}

        <button type="submit">Guardar cambios</button>

    </form>

</div>

</body>
</html>
